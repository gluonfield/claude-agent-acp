name: Release Standalone

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Standalone release version, without leading v"
        required: true
        default: "0.49.0-jaz.1"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - run: npm ci
      - run: npm run test:run
      - run: bash script/build-standalone-release.sh "${{ inputs.version }}" dist/standalone

      - name: Write checksums
        run: |
          cd dist/standalone
          sha256sum *.tar.gz > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Standalone ${{ inputs.version }}
          prerelease: false
          generate_release_notes: true
          files: |
            dist/standalone/*.tar.gz
            dist/standalone/SHA256SUMS
